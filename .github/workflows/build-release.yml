name: Build and Release Zip

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create zip
        run: cd dist && zip -r ../tshock-web-controller.zip .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: tshock-web-controller.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
