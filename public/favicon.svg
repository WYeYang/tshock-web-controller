<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="50%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  
  <!-- Transparent background with gradient border -->
  <rect x="16" y="16" width="224" height="224" rx="32" fill="none" stroke="url(#borderGrad)" stroke-width="3"/>
  
  <!-- Text TSC with gradient -->
  <text x="128" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="800" fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">TSC</text>
</svg>
